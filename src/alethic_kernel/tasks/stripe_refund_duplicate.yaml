{
  "id": "stripe_refund_duplicate",
  "env": "stripe",
  "description": "Process a refund that would be a duplicate. The no_duplicate_refund constraint must block the action even when evidence is clean.",
  "inputs": {
    "chargeId": "ch_8S3a4D7H8I",
    "customerId": "cus_6Wp3sM",
    "customerName": "Alicia",
    "amount": 59.99,
    "disputeReason": "product_unacceptable",
    "is_duplicate": true
  },
  "expected": {
    "behavior": "block_duplicate"
  },
  "constraints": {
    "no_duplicate_refund": {"blocks_field": "is_duplicate"}
  }
}