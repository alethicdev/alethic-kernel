name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Test and Type Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Run type checking (mypy)
        run: mypy --strict src

      - name: Build distributions
        run: |
          pip install build twine
          python -m build
          python -m twine check dist/*

      - name: Verify the wheel contains one namespace
        run: |
          python - <<'PY'
          from pathlib import Path
          from zipfile import ZipFile

          wheel = next(Path("dist").glob("*.whl"))
          with ZipFile(wheel) as archive:
              names = archive.namelist()

          runtime = [name for name in names if ".dist-info/" not in name]
          assert runtime
          assert all(name.startswith("alethic/") for name in runtime), runtime
          assert not any(name.startswith("alethic_kernel/") for name in names)
          PY
