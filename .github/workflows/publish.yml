name: Publish to PyPI

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/alethic-kernel/
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build distributions
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*

      - name: Verify the wheel contains one namespace
        run: |
          python - <<'PY'
          from pathlib import Path
          from zipfile import ZipFile

          wheel = next(Path("dist").glob("*.whl"))
          with ZipFile(wheel) as archive:
              names = archive.namelist()

          runtime = [name for name in names if ".dist-info/" not in name]
          assert runtime
          assert all(name.startswith("alethic/") for name in runtime), runtime
          assert not any(name.startswith("alethic_kernel/") for name in names)
          PY

      - name: Publish distributions
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
